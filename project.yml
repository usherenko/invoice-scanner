name: InvoiceScanner
options:
  bundleIdPrefix: com.usherenko
  deploymentTarget:
    macOS: "12.0"

targets:
  InvoiceScanner:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.md"
          - ".github/**"
          - "build/**"
          - ".git/**"
    info:
      path: Info.plist
      properties:
        CFBundleName: GoDaddy Invoice Scanner
        CFBundleDisplayName: GoDaddy Invoice Scanner
        CFBundleIdentifier: com.usherenko.invoicescanner
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: "12.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    dependencies:
      - sdk: Network.framework
      - sdk: Security.framework
    settings:
      base:
        PRODUCT_NAME: GoDaddy Invoice Scanner
        PRODUCT_BUNDLE_IDENTIFIER: com.usherenko.invoicescanner
        DEVELOPMENT_TEAM: UsherenkoAI
        MACOSX_DEPLOYMENT_TARGET: "12.0"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
