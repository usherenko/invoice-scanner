name: Build

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resize icon to 1024x1024
        run: sips -z 1024 1024 Assets.xcassets/AppIcon.appiconset/AppIcon.png

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project InvoiceScanner.xcodeproj \
            -scheme InvoiceScanner \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=12.0 \
            2>&1

      - name: Patch all binaries and Info.plist to macOS 12.0
        run: |
          APP=$(find build/DerivedData -name "*.app" -type d | head -1)

          # Patch every Mach-O binary in the bundle (main exe + all dylibs)
          find "$APP" -type f | while read -r f; do
            if file "$f" | grep -qE "Mach-O (64-bit )?executable|Mach-O (64-bit )?dynamically linked shared library|Mach-O (64-bit )?bundle"; then
              echo "Patching: $f"
              vtool -set-build-version macos 12.0 12.0 -replace -output "$f" "$f" 2>/dev/null || true
            fi
          done

          /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion 12.0" "$APP/Contents/Info.plist"
          echo "Done patching"

      - name: Ad-hoc sign
        run: |
          APP=$(find build/DerivedData -name "*.app" -type d | head -1)
          codesign --force --deep --sign - "$APP"

      - name: Package app
        run: |
          APP=$(find build/DerivedData -name "*.app" -type d | head -1)
          cp -r "$APP" "build/GoDaddy Invoice Scanner.app"
          chmod +x "build/GoDaddy Invoice Scanner.app/Contents/MacOS/"*
          cd build && ditto -c -k --keepParent "GoDaddy Invoice Scanner.app" "GoDaddy Invoice Scanner.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoDaddy-Invoice-Scanner
          path: "build/GoDaddy Invoice Scanner.zip"
          retention-days: 30
