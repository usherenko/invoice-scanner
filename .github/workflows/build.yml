name: Build

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resize icon to 1024x1024
        run: sips -z 1024 1024 Assets.xcassets/AppIcon.appiconset/AppIcon.png

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project InvoiceScanner.xcodeproj \
            -scheme InvoiceScanner \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=12.0 \
            2>&1

      - name: Ad-hoc sign
        run: |
          APP=$(find build/DerivedData -name "*.app" -type d | head -1)
          codesign --force --deep --sign - "$APP"

      - name: Package app
        run: |
          APP=$(find build/DerivedData -name "*.app" -type d | head -1)
          cp -r "$APP" "build/GoDaddy Invoice Scanner.app"
          cd build && zip -r "GoDaddy Invoice Scanner.zip" "GoDaddy Invoice Scanner.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoDaddy-Invoice-Scanner
          path: "build/GoDaddy Invoice Scanner.zip"
          retention-days: 30
